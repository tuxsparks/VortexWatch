<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>VortexWatch Simple Radar</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.timedimension@1.1.1/dist/leaflet.timedimension.control.min.css">

<style>

  html,body{margin:0;padding:0;height:100%;font-family:system-ui,Arial;background:#0b0e11;color:#fff}
  #map{height:100vh;width:100%}
  
  .ctrl-panel{
    position:absolute;
    top:12px;left:12px;z-index:1000;
    background:rgba(20,20,20,.9);
    border:1px solid #444;
    border-radius:6px;
    padding:12px 14px;
    width:220px;
    font-size:13px;
    box-shadow:0 4px 14px rgba(0,0,0,.6);
  }
  .ctrl-panel h3{margin:0 0 10px;font-size:14px;color:#ffcc00}
  .ctrl-panel label{display:flex;align-items:center;margin:6px 0;cursor:pointer}
  .ctrl-panel input{margin-right:8px}
  .ctrl-panel small{display:block;margin-top:10px;color:#999;font-size:11px}

  .legend{
    position:absolute;
    bottom:14px;right:14px;z-index:1000;
    background:rgba(0,0,0,.8);
    border:1px solid #444;
    border-radius:6px;
    padding:10px 12px;
    font-size:11px;
    line-height:1.6;
  }
  .legend b{color:#ffcc00}
  .legend i{display:inline-block;width:14px;height:14px;margin-right:6px;vertical-align:middle;border-radius:2px}

  .leaflet-popup-content-wrapper{background:#111;color:#fff;border:1px solid #444}
  .leaflet-popup-tip{background:#111}
</style>
</head>

<body>
<div id="map"></div>

<div class="ctrl-panel">
  <h3>Radar Controls</h3>
  <label><input type="checkbox" id="radarToggle" checked> Radar Layer</label>
  <label><input type="checkbox" id="warnToggle" checked> NWS Warnings</label>
  <label><input type="checkbox" id="towerToggle" checked> Radar Towers</label>

  <div>View</div>
  <select id="sourceSelect">
    <option value="composite">National Composite</option>
    <option value="site">Selected Tower</option>
  </select>

  <div>Product</div>
  <select id="productSelect">
    <option value="reflectivity">Reflectivity</option>
    <option value="velocity">Base Velocity</option>
  </select>

  <div>Radar Tower</div>
  <select id="stationSelect">
    <option value="">Loading towers...</option>
  </select>

  <div>Timeline</div>
  <button id="playPauseBtn" type="button">Play</button>
  <button id="latestBtn" type="button">Latest</button>
  <input type="range" id="timeline" min="0" max="0" value="0" step="1">
  <small id="timelineLabel">Loading radar frames...</small>
  <small id="statusText">Sources: IEM RIDGE / IEM NEXRAD WMS / weather.gov</small>
</div>

<div class="legend" id="legendBox">
  <b>Reflectivity intensity</b><br>
  <i style="background:blue"></i>Light<br>
  <i style="background:green"></i>Moderate<br>
  <i style="background:yellow"></i>Heavy<br>
  <i style="background:red"></i>Very Heavy<br>
  <i style="background:white"></i>Extreme<br>
  <i style="background:purple"></i>Hail / Severe
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.timedimension@1.1.1/dist/leaflet.timedimension.min.js"></script>
<script>
const RADAR_REFRESH_MS = 2 * 60 * 1000;
const WARN_REFRESH_MS = 60 * 1000;
const PLAYBACK_MS = 900;
const SITE_LOOKBACK_MINUTES = 120;
const MAX_SITE_FRAMES = 12;
const COMPOSITE_OFFSETS = [55, 50, 45, 40, 35, 30, 25, 20, 15, 10, 5, 0];
const RADAR_CACHE_TTL_MS = 2 * 60 * 1000;
const FRAME_PRELOAD_DELAY_MS = 150;
const LOAD_SWAP_TIMEOUT_MS = 1800;
const COMPOSITE_WMS_URL = 'https://mesonet.agron.iastate.edu/cgi-bin/wms/nexrad/n0q.cgi';
const IEM_RADAR_JSON_URL = 'https://mesonet.agron.iastate.edu/json/radar.py';
const IEM_RIDGE_TILE_URL = 'https://mesonet.agron.iastate.edu/cache/tile.py/1.0.0/';
const WEATHER_GOV_STATIONS_URL = 'https://api.weather.gov/radar/stations?stationType=WSR-88D';
const WEATHER_GOV_ALERTS_URL = 'https://api.weather.gov/alerts/active?status=actual&message_type=alert';
const RADAR_OPACITY = 0.72;

const FALLBACK_STATIONS = [
  {id: 'KTLX', ridgeId: 'TLX', name: 'Norman', lat: 35.3331, lon: -97.2778, elevationFt: 1201},
  {id: 'KDMX', ridgeId: 'DMX', name: 'Des Moines', lat: 41.7312, lon: -93.7229, elevationFt: 981},
  {id: 'KBMX', ridgeId: 'BMX', name: 'Birmingham', lat: 33.1718, lon: -86.7697, elevationFt: 645},
  {id: 'KBUF', ridgeId: 'BUF', name: 'Buffalo', lat: 42.9489, lon: -78.7367, elevationFt: 693},
  {id: 'KIND', ridgeId: 'IND', name: 'Indianapolis', lat: 39.7075, lon: -86.2803, elevationFt: 790},
  {id: 'KFFC', ridgeId: 'FFC', name: 'Atlanta', lat: 33.3636, lon: -84.5658, elevationFt: 858},
  {id: 'KHGX', ridgeId: 'HGX', name: 'Houston', lat: 29.4719, lon: -95.0789, elevationFt: 18},
  {id: 'KOKX', ridgeId: 'OKX', name: 'Brookhaven', lat: 40.8655, lon: -72.8639, elevationFt: 85}
];

const radarToggle = document.getElementById('radarToggle');
const warnToggle = document.getElementById('warnToggle');
const towerToggle = document.getElementById('towerToggle');
const sourceSelect = document.getElementById('sourceSelect');
const productSelect = document.getElementById('productSelect');
const stationSelect = document.getElementById('stationSelect');
const timeline = document.getElementById('timeline');
const playPauseBtn = document.getElementById('playPauseBtn');
const latestBtn = document.getElementById('latestBtn');
const timelineLabel = document.getElementById('timelineLabel');
const statusText = document.getElementById('statusText');
const legendBox = document.getElementById('legendBox');

const map = L.map('map', {center: [39, -98.5], zoom: 5, zoomControl: false});
L.control.zoom({position: 'topright'}).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">Carto</a>',
  maxZoom: 19
}).addTo(map);

const warningLayer = L.layerGroup().addTo(map);
const towerLayer = L.layerGroup().addTo(map);

const state = {
  stations: [],
  selectedStationId: '',
  frames: [],
  frameLayers: [],
  currentIndex: 0,
  actualProduct: 'N0Q',
  playbackTimer: null,
  radarLoadToken: 0,
  frameActivationToken: 0,
  radarDataCache: new Map(),
  layerCache: new Map(),
  preloadTimer: null,
  isRadarBusy: false
};

function escapeHtml(value) {
  return String(value || '').replace(/[&<>"']/g, function (char) {
    return {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[char];
  });
}

function normalizeRadarId(id) {
  return id && id.length === 4 ? id.slice(1) : id;
}

function truncate(text, maxLength) {
  if (!text) return '';
  if (text.length <= maxLength) return text;
  return text.slice(0, maxLength - 3) + '...';
}

function toIemIso(date) {
  return new Date(date).toISOString().slice(0, 16) + 'Z';
}

function isoToCompactStamp(iso) {
  if (iso === '0') return '0';
  return iso.replace(/[-:TZ]/g, '').slice(0, 12);
}

function formatLocalDateTime(value) {
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return 'Unknown time';
  return date.toLocaleString([], {
    month: 'short',
    day: 'numeric',
    hour: 'numeric',
    minute: '2-digit'
  });
}

function metersToFeet(meters) {
  if (meters === null || meters === undefined) return null;
  return Math.round(meters * 3.28084);
}

function setStatus(message) {
  statusText.textContent = message;
}

function setRadarBusy(isBusy, timelineMessage, statusMessage) {
  state.isRadarBusy = isBusy;
  if (timelineMessage) {
    timelineLabel.textContent = (isBusy ? '⌛ ' : '') + timelineMessage;
  }
  if (statusMessage) {
    setStatus((isBusy ? '⌛ ' : '') + statusMessage);
  }
  syncControlState();
}

function stopPlayback() {
  if (state.playbackTimer) {
    clearInterval(state.playbackTimer);
    state.playbackTimer = null;
  }
  playPauseBtn.textContent = 'Play';
}

function startPlayback() {
  if (state.frames.length < 2) return;
  stopPlayback();
  state.playbackTimer = setInterval(function () {
    const nextIndex = (state.currentIndex + 1) % state.frames.length;
    showFrame(nextIndex);
  }, PLAYBACK_MS);
  playPauseBtn.textContent = 'Pause';
}

function togglePlayback() {
  if (state.playbackTimer) {
    stopPlayback();
    return;
  }
  startPlayback();
}

function updateLegend() {
  if (productSelect.value === 'velocity' && sourceSelect.value === 'site') {
    const velocityNote = state.actualProduct === 'N0S'
      ? 'Loop is using storm-relative velocity because archived N0U frames were unavailable.'
      : 'Loop is using base velocity imagery.';
    legendBox.innerHTML = [
      '<b>Velocity radar</b><br>',
      '<i style="background:#00ff66"></i>Outbound / away<br>',
      '<i style="background:#ff4d4d"></i>Inbound / toward<br>',
      '<i style="background:#777"></i>Low relative speed<br>',
      escapeHtml(velocityNote)
    ].join('');
    return;
  }

  legendBox.innerHTML = [
    '<b>Reflectivity intensity</b><br>',
    '<i style="background:blue"></i>Light<br>',
    '<i style="background:green"></i>Moderate<br>',
    '<i style="background:yellow"></i>Heavy<br>',
    '<i style="background:red"></i>Very Heavy<br>',
    '<i style="background:white"></i>Extreme<br>',
    '<i style="background:purple"></i>Hail / Severe'
  ].join('');
}

function syncControlState() {
  if (productSelect.value === 'velocity' && sourceSelect.value !== 'site') {
    sourceSelect.value = 'site';
  }
  stationSelect.disabled = !state.stations.length || state.isRadarBusy;
  sourceSelect.disabled = state.isRadarBusy;
  productSelect.disabled = state.isRadarBusy;
  playPauseBtn.disabled = state.isRadarBusy || state.frames.length < 2;
  latestBtn.disabled = state.isRadarBusy || !state.frames.length || state.currentIndex === state.frames.length - 1;
  timeline.disabled = state.isRadarBusy || state.frames.length < 2;
  updateLegend();
}

function getSelectedStation() {
  return state.stations.find(function (station) {
    return station.id === state.selectedStationId;
  }) || null;
}

function findNearestStation(latlng) {
  if (!state.stations.length) return null;
  const lonFactor = Math.cos(latlng.lat * Math.PI / 180);
  let closestStation = null;
  let closestDistance = Infinity;

  state.stations.forEach(function (station) {
    const dLat = station.lat - latlng.lat;
    const dLon = (station.lon - latlng.lng) * lonFactor;
    const score = (dLat * dLat) + (dLon * dLon);
    if (score < closestDistance) {
      closestDistance = score;
      closestStation = station;
    }
  });

  return closestStation;
}

function updateStationHighlights() {
  towerLayer.eachLayer(function (marker) {
    const isSelected = marker.stationId === state.selectedStationId;
    marker.setStyle({
      radius: isSelected ? 7 : 5,
      color: isSelected ? '#ffcc00' : '#00bcd4',
      fillColor: isSelected ? '#ffcc00' : '#00bcd4',
      fillOpacity: 0.9,
      weight: isSelected ? 2 : 1
    });
  });
}

function syncTowerLayerVisibility() {
  if (towerToggle.checked) {
    if (!map.hasLayer(towerLayer)) towerLayer.addTo(map);
    return;
  }
  if (map.hasLayer(towerLayer)) map.removeLayer(towerLayer);
}

function ensureSelectedStation() {
  if (state.selectedStationId) return getSelectedStation();
  const fallback = findNearestStation(map.getCenter());
  if (!fallback) return null;
  state.selectedStationId = fallback.id;
  stationSelect.value = fallback.id;
  updateStationHighlights();
  return fallback;
}

function setSelectedStation(stationId, options) {
  const settings = Object.assign({
    recenter: false,
    switchToSite: false,
    refresh: true
  }, options || {});

  const station = state.stations.find(function (entry) {
    return entry.id === stationId;
  });

  if (!station) return;

  state.selectedStationId = station.id;
  stationSelect.value = station.id;

  if (settings.switchToSite) {
    sourceSelect.value = 'site';
  }

  updateStationHighlights();
  syncControlState();

  if (settings.recenter) {
    map.setView([station.lat, station.lon], Math.max(map.getZoom(), 7));
  }

  if (settings.refresh) {
    refreshRadarFrames();
  }
}

function renderStations() {
  towerLayer.clearLayers();

  state.stations.forEach(function (station) {
    const marker = L.circleMarker([station.lat, station.lon], {
      radius: 5,
      color: '#00bcd4',
      fillColor: '#00bcd4',
      fillOpacity: 0.9,
      weight: 1
    });

    marker.stationId = station.id;
    marker.bindPopup([
      '<b>', escapeHtml(station.id), '</b> - ', escapeHtml(station.name), '<br>',
      'IEM ID: ', escapeHtml(station.ridgeId), '<br>',
      'Elevation: ', station.elevationFt ? escapeHtml(station.elevationFt + ' ft') : 'Unknown', '<br>',
      'Click to load this tower.'
    ].join(''));
    marker.on('click', function () {
      setSelectedStation(station.id, {recenter: true, switchToSite: true});
    });
    marker.addTo(towerLayer);
  });

  updateStationHighlights();
  syncTowerLayerVisibility();
}

function populateStationSelect() {
  stationSelect.innerHTML = '';

  if (!state.stations.length) {
    const option = document.createElement('option');
    option.value = '';
    option.textContent = 'No towers available';
    stationSelect.appendChild(option);
    syncControlState();
    return;
  }

  state.stations.forEach(function (station) {
    const option = document.createElement('option');
    option.value = station.id;
    option.textContent = station.id + ' ' + truncate(station.name, 18);
    option.title = station.name;
    stationSelect.appendChild(option);
  });

  if (!state.selectedStationId) {
    const nearest = findNearestStation(map.getCenter());
    if (nearest) state.selectedStationId = nearest.id;
  }

  if (state.selectedStationId) {
    stationSelect.value = state.selectedStationId;
  }

  syncControlState();
}

async function fetchJson(url) {
  const response = await fetch(url, {
    headers: {
      'Accept': 'application/geo+json, application/json'
    }
  });
  if (!response.ok) {
    throw new Error('Request failed with status ' + response.status);
  }
  return response.json();
}

async function loadStations() {
  try {
    const data = await fetchJson(WEATHER_GOV_STATIONS_URL);
    const features = Array.isArray(data.features) ? data.features : [];

    state.stations = features.map(function (feature) {
      const coords = feature.geometry && feature.geometry.coordinates ? feature.geometry.coordinates : [];
      const props = feature.properties || {};
      const id = props.id || '';
      return {
        id: id,
        ridgeId: normalizeRadarId(id),
        name: props.name || id,
        lat: coords[1],
        lon: coords[0],
        elevationFt: metersToFeet(props.elevation && props.elevation.value)
      };
    }).filter(function (station) {
      return station.id && station.ridgeId && Number.isFinite(station.lat) && Number.isFinite(station.lon);
    }).sort(function (left, right) {
      return left.id.localeCompare(right.id);
    });
  } catch (error) {
    state.stations = FALLBACK_STATIONS.slice();
    setStatus('Tower metadata API unavailable. Using fallback tower list.');
  }

  populateStationSelect();
  renderStations();
  ensureSelectedStation();

  if (sourceSelect.value === 'site' || productSelect.value === 'velocity') {
    refreshRadarFrames();
  }
}

function removeRadarLayers() {
  if (state.preloadTimer) {
    clearTimeout(state.preloadTimer);
    state.preloadTimer = null;
  }
  state.frameLayers.forEach(function (layer) {
    if (layer && map.hasLayer(layer)) map.removeLayer(layer);
  });
  state.frameLayers = [];
  state.frames = [];
  state.currentIndex = 0;
}

function getRadarDataCacheKey() {
  if (sourceSelect.value === 'composite') return 'composite:reflectivity';
  const station = ensureSelectedStation();
  return station ? 'site:' + station.ridgeId + ':' + productSelect.value : 'site:none:' + productSelect.value;
}

function getCachedRadarData(cacheKey) {
  const entry = state.radarDataCache.get(cacheKey);
  if (!entry) return null;
  if ((Date.now() - entry.cachedAt) > RADAR_CACHE_TTL_MS) {
    state.radarDataCache.delete(cacheKey);
    return null;
  }
  return entry.data;
}

function setCachedRadarData(cacheKey, data) {
  state.radarDataCache.set(cacheKey, {
    cachedAt: Date.now(),
    data: data
  });
}

function buildCompositeFrames() {
  return {
    actualProduct: 'N0Q',
    status: 'National composite reflectivity loop ready.',
    frames: COMPOSITE_OFFSETS.map(function (offset) {
      return {
        key: 'composite:' + (offset === 0 ? 'latest' : 'm' + String(offset).padStart(2, '0')),
        type: 'composite',
        offset: offset,
        label: offset === 0 ? 'Latest composite' : offset + ' min ago',
        layerName: offset === 0
          ? 'nexrad-n0q-900913'
          : 'nexrad-n0q-900913-m' + String(offset).padStart(2, '0') + 'm'
      };
    })
  };
}

async function fetchSiteScanTimes(radarId, productId) {
  const now = new Date();
  const start = new Date(now.getTime() - (SITE_LOOKBACK_MINUTES * 60 * 1000));
  const url = new URL(IEM_RADAR_JSON_URL);
  url.searchParams.set('operation', 'list');
  url.searchParams.set('radar', radarId);
  url.searchParams.set('product', productId);
  url.searchParams.set('start', toIemIso(start));
  url.searchParams.set('end', toIemIso(now));
  const data = await fetchJson(url.toString());
  const scans = Array.isArray(data.scans) ? data.scans : [];
  return scans.map(function (scan) {
    return scan.ts;
  }).filter(Boolean);
}

async function buildSiteFrames(station) {
  const productPreference = productSelect.value === 'velocity'
    ? [
        {id: 'N0U', label: 'base velocity'},
        {id: 'N0S', label: 'storm-relative velocity'}
      ]
    : [
        {id: 'N0B', label: 'reflectivity'},
        {id: 'N0Q', label: 'reflectivity'}
      ];

  let selectedProduct = productPreference[0];
  let scanTimes = [];

  for (let i = 0; i < productPreference.length; i += 1) {
    const candidate = productPreference[i];
    try {
      scanTimes = await fetchSiteScanTimes(station.ridgeId, candidate.id);
    } catch (error) {
      scanTimes = [];
    }
    if (scanTimes.length) {
      selectedProduct = candidate;
      break;
    }
  }

  let status = station.id + ' ' + station.name + ' ' + selectedProduct.label + ' loop ready.';

  if (!scanTimes.length) {
    status = station.id + ' ' + station.name + ' latest ' + selectedProduct.label + ' frame ready.';
    return {
      actualProduct: selectedProduct.id,
      status: status,
      frames: [
        {
          key: 'site:' + station.ridgeId + ':' + selectedProduct.id + ':latest',
          type: 'site',
          label: 'Latest frame',
          url: IEM_RIDGE_TILE_URL + 'ridge::' + station.ridgeId + '-' + selectedProduct.id + '-0/{z}/{x}/{y}.png'
        }
      ]
    };
  }

  const limitedScans = scanTimes.slice(-MAX_SITE_FRAMES);

  if (productSelect.value === 'velocity' && selectedProduct.id !== 'N0U') {
    status = station.id + ' ' + station.name + ' base velocity requested; using storm-relative velocity because archived N0U frames are unavailable.';
  }

  return {
    actualProduct: selectedProduct.id,
    status: status,
    frames: limitedScans.map(function (scanTime) {
      return {
        key: 'site:' + station.ridgeId + ':' + selectedProduct.id + ':' + isoToCompactStamp(scanTime),
        type: 'site',
        label: formatLocalDateTime(scanTime),
        url: IEM_RIDGE_TILE_URL + 'ridge::' + station.ridgeId + '-' + selectedProduct.id + '-' + isoToCompactStamp(scanTime) + '/{z}/{x}/{y}.png'
      };
    })
  };
}

function buildLayerForFrame(frame) {
  const cachedLayer = state.layerCache.get(frame.key);
  if (cachedLayer) return cachedLayer;

  let layer;
  if (frame.type === 'composite') {
    layer = L.tileLayer.wms(COMPOSITE_WMS_URL, {
      layers: frame.layerName,
      format: 'image/png',
      transparent: true,
      opacity: 0,
      maxNativeZoom: 10
    });
  } else {
    layer = L.tileLayer(frame.url, {
      opacity: 0,
      maxZoom: 19,
      crossOrigin: true
    });
  }

  state.layerCache.set(frame.key, layer);
  return layer;
}

function ensureFrameLayer(index) {
  if (index < 0 || index >= state.frames.length) return null;
  if (state.frameLayers[index]) return state.frameLayers[index];
  const layer = buildLayerForFrame(state.frames[index]);
  state.frameLayers[index] = layer;
  return layer;
}

function waitForLayerLoad(layer) {
  return new Promise(function (resolve) {
    let finished = false;

    function done() {
      if (finished) return;
      finished = true;
      clearTimeout(timeoutId);
      layer.off('load', done);
      layer.off('tileerror', done);
      resolve();
    }

    const timeoutId = setTimeout(done, LOAD_SWAP_TIMEOUT_MS);
    layer.once('load', done);
    layer.once('tileerror', done);
  });
}

function scheduleFramePreload(centerIndex) {
  if (state.preloadTimer) clearTimeout(state.preloadTimer);
  state.preloadTimer = setTimeout(function () {
    [centerIndex - 1, centerIndex + 1, centerIndex - 2, centerIndex + 2].forEach(function (index) {
      if (index < 0 || index >= state.frames.length) return;
      const layer = ensureFrameLayer(index);
      if (!layer) return;
      if (!map.hasLayer(layer)) {
        layer.setOpacity(0);
        layer.addTo(map);
      }
    });
  }, FRAME_PRELOAD_DELAY_MS);
}

async function activateFrame(index, options) {
  if (!state.frames.length) return;

  const settings = Object.assign({
    oldLayers: [],
    skipBusyState: false
  }, options || {});
  const clampedIndex = Math.max(0, Math.min(index, state.frames.length - 1));
  const frame = state.frames[clampedIndex];
  const layer = ensureFrameLayer(clampedIndex);
  const activationToken = ++state.frameActivationToken;
  const layerAlreadyPresent = map.hasLayer(layer);

  state.currentIndex = clampedIndex;
  timeline.value = String(clampedIndex);
  timelineLabel.textContent = (clampedIndex + 1) + '/' + state.frames.length + ' - ' + frame.label;

  if (!layerAlreadyPresent) {
    layer.setOpacity(0);
    layer.addTo(map);
  }

  if (!settings.skipBusyState && !layerAlreadyPresent) {
    setRadarBusy(true, 'Loading ' + frame.label + '...', 'Loading radar frame...');
  }

  if (!layerAlreadyPresent) {
    await waitForLayerLoad(layer);
    if (activationToken !== state.frameActivationToken) return;
  }

  state.frameLayers.forEach(function (entry, layerIndex) {
    if (!entry || !map.hasLayer(entry)) return;
    entry.setOpacity(layerIndex === clampedIndex ? RADAR_OPACITY : 0);
  });

  if (layer.bringToFront) layer.bringToFront();

  settings.oldLayers.forEach(function (oldLayer) {
    if (oldLayer !== layer && map.hasLayer(oldLayer)) {
      map.removeLayer(oldLayer);
    }
  });

  timeline.value = String(clampedIndex);
  timelineLabel.textContent = (clampedIndex + 1) + '/' + state.frames.length + ' - ' + frame.label;
  scheduleFramePreload(clampedIndex);
  if (!settings.skipBusyState) {
    setRadarBusy(false);
  } else {
    syncControlState();
  }
}

function showFrame(index) {
  if (!state.frames.length) return;
  activateFrame(index, {oldLayers: [], skipBusyState: true});
}

async function refreshRadarFrames(options) {
  const settings = Object.assign({
    preservePosition: false,
    resumePlayback: false,
    useCache: true
  }, options || {});

  syncControlState();

  const previousDistanceFromEnd = settings.preservePosition && state.frames.length
    ? (state.frames.length - 1 - state.currentIndex)
    : 0;

  stopPlayback();

  if (!radarToggle.checked) {
    removeRadarLayers();
    timeline.max = 0;
    timeline.value = 0;
    timelineLabel.textContent = 'Radar layer hidden.';
    setStatus('Radar layer hidden.');
    syncControlState();
    return;
  }

  const token = ++state.radarLoadToken;
  const oldLayers = state.frameLayers.filter(Boolean).filter(function (layer) {
    return map.hasLayer(layer);
  });
  setRadarBusy(true, 'Loading radar frames...', 'Loading radar frames...');

  try {
    let radarData;
    const cacheKey = getRadarDataCacheKey();
    const cachedData = settings.useCache ? getCachedRadarData(cacheKey) : null;

    if (cachedData) {
      radarData = cachedData;
    } else {
      if (sourceSelect.value === 'site') {
        const station = ensureSelectedStation();
        if (!station) {
          throw new Error('No radar towers are available yet.');
        }
        radarData = await buildSiteFrames(station);
      } else {
        radarData = buildCompositeFrames();
      }
      setCachedRadarData(cacheKey, radarData);
    }

    if (token !== state.radarLoadToken) return;

    state.actualProduct = radarData.actualProduct;
    state.frames = radarData.frames;
    state.frameLayers = new Array(radarData.frames.length).fill(null);

    timeline.min = 0;
    timeline.max = Math.max(0, state.frames.length - 1);
    timeline.step = 1;

    const nextIndex = settings.preservePosition && state.frames.length
      ? Math.max(0, state.frames.length - 1 - Math.min(previousDistanceFromEnd, state.frames.length - 1))
      : Math.max(0, state.frames.length - 1);

    await activateFrame(nextIndex, {oldLayers: oldLayers});
    if (token !== state.radarLoadToken) return;
    setStatus(radarData.status);

    if (settings.resumePlayback && state.frames.length > 1) {
      startPlayback();
    }
  } catch (error) {
    if (token !== state.radarLoadToken) return;
    removeRadarLayers();
    timeline.max = 0;
    timeline.value = 0;
    timelineLabel.textContent = 'Unable to load radar frames.';
    setStatus('Radar data is unavailable right now.');
    setRadarBusy(false);
  }
}

function getAlertContext(properties) {
  const parameters = properties && properties.parameters ? properties.parameters : {};
  const headlineParameters = Array.isArray(parameters.NWSheadline) ? parameters.NWSheadline.join(' ') : '';
  return [
    properties && properties.event ? properties.event : '',
    properties && properties.headline ? properties.headline : '',
    properties && properties.description ? properties.description : '',
    headlineParameters
  ].join(' ').toLowerCase();
}

function shouldRenderAlert(feature) {
  const properties = feature.properties || {};
  const event = (properties.event || '').toLowerCase();
  const context = getAlertContext(properties);
  return Boolean(feature.geometry) && (event.includes('warning') || context.includes('tornado emergency'));
}

function getAlertStyle(feature) {
  const properties = feature.properties || {};
  const event = (properties.event || '').toLowerCase();
  const context = getAlertContext(properties);

  if (context.includes('tornado emergency')) {
    return {color: '#b100ff', weight: 3, fillColor: '#ff00ff', fillOpacity: 0.4};
  }
  if (event.includes('hurricane')) {
    return {color: '#ff1493', weight: 3, fillColor: '#ff1493', fillOpacity: 0.3};
  }
  if (event.includes('tornado')) {
    return {color: '#ff0000', weight: 3, fillColor: '#ff0000', fillOpacity: 0.32};
  }
  if (event.includes('snow squall')) {
    return {color: '#7fefff', weight: 2, fillColor: '#ffffff', fillOpacity: 0.2};
  }
  if (event.includes('flash flood')) {
    return {color: '#00ff66', weight: 2, fillColor: '#00ff66', fillOpacity: 0.28};
  }
  if (event.includes('flood warning')) {
    return {color: '#00c853', weight: 2, fillColor: '#00c853', fillOpacity: 0.22};
  }
  if (event.includes('severe thunderstorm')) {
    return {color: '#ffa500', weight: 2, fillColor: '#ffa500', fillOpacity: 0.28};
  }
  if (event.includes('winter')) {
    return {color: '#00ffff', weight: 2, fillColor: '#00ffff', fillOpacity: 0.24};
  }
  return {color: '#ffff00', weight: 1, fillColor: '#ffff00', fillOpacity: 0.18};
}

function getAlertDisplayName(properties) {
  return getAlertContext(properties).includes('tornado emergency')
    ? 'Tornado Emergency'
    : (properties.event || 'Warning');
}

async function fetchWarnings() {
  if (!warnToggle.checked) {
    warningLayer.clearLayers();
    return;
  }

  try {
    const data = await fetchJson(WEATHER_GOV_ALERTS_URL);
    const features = Array.isArray(data.features) ? data.features.filter(shouldRenderAlert) : [];

    warningLayer.clearLayers();
    L.geoJSON(features, {
      style: getAlertStyle,
      onEachFeature: function (feature, layer) {
        const properties = feature.properties || {};
        const popupHtml = [
          '<b>', escapeHtml(getAlertDisplayName(properties)), '</b><br>',
          escapeHtml(properties.headline || ''), '<br>',
          escapeHtml(properties.areaDesc || ''), '<br>',
          'Sent: ', escapeHtml(formatLocalDateTime(properties.sent || properties.effective || properties.onset || '')), '<br>',
          'Ends: ', escapeHtml(formatLocalDateTime(properties.ends || properties.expires || ''))
        ].join('');
        layer.bindPopup(popupHtml);
      }
    }).addTo(warningLayer);
  } catch (error) {
    warningLayer.clearLayers();
  }
}

radarToggle.addEventListener('change', function () {
  if (!radarToggle.checked) {
    stopPlayback();
    removeRadarLayers();
    timeline.max = 0;
    timeline.value = 0;
    timelineLabel.textContent = 'Radar layer hidden.';
    setStatus('Radar layer hidden.');
    syncControlState();
    return;
  }
  refreshRadarFrames();
});

warnToggle.addEventListener('change', fetchWarnings);
towerToggle.addEventListener('change', syncTowerLayerVisibility);

sourceSelect.addEventListener('change', function () {
  syncControlState();
  refreshRadarFrames();
});

productSelect.addEventListener('change', function () {
  syncControlState();
  refreshRadarFrames();
});

stationSelect.addEventListener('change', function () {
  if (!stationSelect.value) return;
  setSelectedStation(stationSelect.value, {recenter: true, switchToSite: true});
});

playPauseBtn.addEventListener('click', togglePlayback);

latestBtn.addEventListener('click', function () {
  stopPlayback();
  showFrame(state.frames.length - 1);
});

timeline.addEventListener('input', function () {
  stopPlayback();
  showFrame(Number(timeline.value));
});

syncControlState();
updateLegend();
loadStations();
fetchWarnings();
refreshRadarFrames();

setInterval(function () {
  refreshRadarFrames({
    preservePosition: true,
    resumePlayback: Boolean(state.playbackTimer)
  });
}, RADAR_REFRESH_MS);

setInterval(fetchWarnings, WARN_REFRESH_MS);
</script>
